<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <!-- Icon: Stacked docs + arrow -->
  <rect x="0" y="6" width="48" height="48" rx="10" fill="#f5a623"/>
  <!-- Back doc -->
  <rect x="16" y="10" width="16" height="18" rx="2" fill="#0d0d0d" opacity="0.35"/>
  <!-- Mid doc -->
  <rect x="12" y="13" width="16" height="18" rx="2" fill="#0d0d0d" opacity="0.6"/>
  <!-- Front doc -->
  <rect x="8" y="16" width="16" height="20" rx="2" fill="#0d0d0d"/>
  <!-- Lines on front doc -->
  <rect x="11" y="21" width="8" height="2" rx="1" fill="#f5a623"/>
  <rect x="11" y="25" width="10" height="2" rx="1" fill="#f5a623"/>
  <rect x="11" y="29" width="6" height="2" rx="1" fill="#f5a623"/>
  <!-- Arrow -->
  <path d="M28 32 L40 32 M36 27 L41 32 L36 37" fill="none" stroke="#0d0d0d" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark: dark text for light backgrounds -->
  <text x="62" y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30" font-weight="900"
    fill="#0d0d0d">Rapid</text>
  <text x="160" y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30" font-weight="900"
    fill="#e85d26">Docs</text>
</svg>
